<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Skill Trigger Eval Review</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; }
      textarea { width: 100%; min-height: 80px; }
      .item { border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <h1>__SKILL_NAME_PLACEHOLDER__ - Trigger Eval Review</h1>
    <p><b>Description:</b> __SKILL_DESCRIPTION_PLACEHOLDER__</p>
    <div id="list"></div>
    <button id="export">Export Eval Set</button>

    <script>
      const data = __EVAL_DATA_PLACEHOLDER__;
      const list = document.getElementById('list');
      data.forEach((row, i) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <label>Query ${i + 1}</label>
          <textarea data-k="query">${row.query || ''}</textarea>
          <label>
            <input type="checkbox" data-k="should_trigger" ${row.should_trigger ? 'checked' : ''} /> should_trigger
          </label>
        `;
        list.appendChild(div);
      });

      document.getElementById('export').onclick = () => {
        const items = [...document.querySelectorAll('.item')].map((el) => {
          const query = el.querySelector('textarea[data-k="query"]').value;
          const should_trigger = el.querySelector('input[data-k="should_trigger"]').checked;
          return { query, should_trigger };
        });
        const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'eval_set.json';
        a.click();
        URL.revokeObjectURL(a.href);
      };
    </script>
  </body>
</html>
